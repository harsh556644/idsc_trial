<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDSC | Indore Diplomatic Standards Council</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="loader">IDSC.</div>
    <div class="cursor-glow"></div>
    
    
    <main>
        <div class="split-screen">
            <div class="split-left" style="background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80') center/cover; position: relative;">
                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to right, rgba(2,8,23,0.9), rgba(2,8,23,0.4));"></div>
                <div style="position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; height: 100%; padding: 10%;">
                    <h1 class="hero-title" style="font-size: 4rem; text-align: left;">Enter the Portal.</h1>
                    <p class="hero-subtitle" style="text-align: left;">Access your delegate dashboard, training resources, and active grievance tickets.</p>
                </div>
            </div>
            <div class="split-right">
                <div class="glass-card login-box">
                    <h2 class="card-title" style="font-size: 2rem; margin-bottom: 30px;">Delegate Login</h2>
                    <form action="dashboard.html">
                        <div class="form-group">
                            <label>Secure ID or Email</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Passcode</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                            <label style="margin: 0;"><input type="checkbox"> Remember Me</label>
                            <a href="#" style="color: var(--accent-blue); text-decoration: none; font-size: 0.9rem;">Forgot Passcode?</a>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Authenticate</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    
    <script src="script.js"></script>
</body>
</html>
